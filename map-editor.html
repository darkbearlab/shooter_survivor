<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Map Editor — Shooter Survivor</title>
  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.js" } }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #0e0e16;
      color: #ccc;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      user-select: none;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #181828;
      border-bottom: 1px solid #2a2a44;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 14px; color: #88aaff; letter-spacing: 2px; margin-right: 8px; }
    .tb-sep { width: 1px; height: 22px; background: #333; margin: 0 4px; }

    button {
      background: #252540;
      border: 1px solid #3a3a60;
      color: #aac;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      border-radius: 3px;
      transition: background 0.1s;
    }
    button:hover { background: #303060; color: #fff; }
    button.active { background: #3a4488; border-color: #6688ff; color: #fff; }

    /* ── Main area ── */
    #main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Left: tools panel ── */
    #tools-panel {
      width: 130px;
      background: #14141f;
      border-right: 1px solid #2a2a44;
      display: flex;
      flex-direction: column;
      padding: 10px 6px;
      gap: 4px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .tool-group-label {
      font-size: 10px;
      color: #556;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 2px 2px;
    }
    #tools-panel button {
      width: 100%;
      text-align: left;
      padding: 5px 8px;
    }
    #tools-panel button .key {
      float: right;
      opacity: 0.4;
      font-size: 10px;
    }

    /* ── Center: grid canvas ── */
    #grid-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #grid-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #grid-hint {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: #445;
      pointer-events: none;
    }

    /* ── Right: properties + preview ── */
    #right-panel {
      width: 260px;
      background: #14141f;
      border-left: 1px solid #2a2a44;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #preview-wrap {
      height: 200px;
      flex-shrink: 0;
      position: relative;
      border-bottom: 1px solid #2a2a44;
      background: #111118;
    }
    #preview-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #preview-label {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 10px;
      color: #445;
      pointer-events: none;
    }
    #preview-hint {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 10px;
      color: #334;
      pointer-events: none;
    }

    #props-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px;
    }
    .section-title {
      font-size: 10px;
      letter-spacing: 1px;
      color: #557;
      text-transform: uppercase;
      padding: 8px 0 4px;
      border-bottom: 1px solid #222;
      margin-bottom: 6px;
    }
    .prop-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .prop-row label { flex: 1; color: #889; font-size: 11px; }
    .prop-row input, .prop-row select {
      width: 80px;
      background: #1e1e30;
      border: 1px solid #334;
      color: #ccc;
      padding: 3px 5px;
      font-family: inherit;
      font-size: 12px;
      border-radius: 2px;
    }
    .prop-row input:focus, .prop-row select:focus {
      outline: none;
      border-color: #5566aa;
    }

    #obj-panel { margin-top: 6px; }
    #obj-panel.hidden { display: none; }
    #obj-del {
      width: 100%;
      margin-top: 6px;
      background: #3a1a1a;
      border-color: #662222;
      color: #ff8888;
    }
    #obj-del:hover { background: #552020; }

    /* Status bar */
    #status-bar {
      display: flex;
      gap: 16px;
      padding: 4px 10px;
      background: #0e0e16;
      border-top: 1px solid #222;
      font-size: 11px;
      color: #446;
      flex-shrink: 0;
    }
    #status-bar span { color: #88aacc; }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div id="topbar">
  <h1>MAP EDITOR</h1>
  <div class="tb-sep"></div>
  <button id="btn-new">New</button>
  <button id="btn-import">Import JSON</button>
  <button id="btn-export">Export JSON</button>
  <div class="tb-sep"></div>
  <button id="btn-center">Center View</button>
  <div style="flex:1"></div>
  <a href="index.html" style="color:#446;font-size:11px;text-decoration:none;">← back to game</a>
</div>

<!-- ── Main ── -->
<div id="main">

  <!-- Left tool panel -->
  <div id="tools-panel">
    <div class="tool-group-label">Draw</div>
    <button data-tool="box">Box / Wall <span class="key">1</span></button>
    <button data-tool="pillar">Pillar <span class="key">2</span></button>
    <button data-tool="platform">Platform <span class="key">3</span></button>

    <div class="tool-group-label">Points</div>
    <button data-tool="spawn">Spawn Pt <span class="key">S</span></button>
    <button data-tool="resource">Resource <span class="key">R</span></button>
    <button data-tool="playerStart">Player Start <span class="key">P</span></button>

    <div class="tool-group-label">Edit</div>
    <button data-tool="erase">Erase <span class="key">E</span></button>

    <div class="tool-group-label" style="margin-top:auto"></div>
    <div style="font-size:10px;color:#334;padding:4px 2px;line-height:1.5">
      Alt+drag: pan<br>
      Wheel: zoom<br>
      RMB: erase<br>
      Del: delete sel
    </div>
  </div>

  <!-- Grid canvas -->
  <div id="grid-panel">
    <canvas id="grid-canvas"></canvas>
    <div id="grid-hint">S=green · R=yellow · P=red</div>
  </div>

  <!-- Right panel: preview + properties -->
  <div id="right-panel">

    <div id="preview-wrap">
      <canvas id="preview-canvas"></canvas>
      <div id="preview-label">3D PREVIEW</div>
      <div id="preview-hint">drag · wheel</div>
    </div>

    <div id="props-scroll">

      <!-- Map properties -->
      <div class="section-title">Map Properties</div>
      <div class="prop-row">
        <label>Name</label>
        <input id="prop-name" type="text" value="Untitled Map" style="width:110px">
      </div>
      <div class="prop-row">
        <label>Width</label>
        <input id="prop-width" type="number" value="60" min="10" max="200">
      </div>
      <div class="prop-row">
        <label>Depth</label>
        <input id="prop-depth" type="number" value="60" min="10" max="200">
      </div>
      <div class="prop-row">
        <label>Wall Height</label>
        <input id="prop-height" type="number" value="6" min="2" max="20" step="0.5">
      </div>

      <!-- Selected object properties -->
      <div id="obj-panel" class="hidden">
        <div class="section-title">Selected Object</div>
        <div class="prop-row"><label>X (center)</label><input id="obj-x" type="number" step="0.5"></div>
        <div class="prop-row"><label>Y (center)</label><input id="obj-y" type="number" step="0.5"></div>
        <div class="prop-row"><label>Z (center)</label><input id="obj-z" type="number" step="0.5"></div>
        <div class="prop-row"><label>Width (X)</label><input id="obj-w" type="number" step="0.5" min="0.5"></div>
        <div class="prop-row"><label>Height (Y)</label><input id="obj-h" type="number" step="0.5" min="0.5"></div>
        <div class="prop-row"><label>Depth (Z)</label><input id="obj-d" type="number" step="0.5" min="0.5"></div>
        <div class="prop-row">
          <label>Material</label>
          <select id="obj-mat">
            <option value="wall">wall</option>
            <option value="floor">floor</option>
            <option value="ceiling">ceiling</option>
            <option value="column">column</option>
          </select>
        </div>
        <button id="obj-del">Delete Object</button>
      </div>

    </div><!-- /props-scroll -->
  </div><!-- /right-panel -->
</div><!-- /main -->

<!-- Status bar -->
<div id="status-bar">
  Objects: <span id="count-objects">0</span>
  &nbsp;·&nbsp; Spawns: <span id="count-spawns">0</span>
  &nbsp;·&nbsp; Resources: <span id="count-resources">0</span>
</div>

<script type="module" src="./src/map-editor/editor-main.js"></script>
</body>
</html>
